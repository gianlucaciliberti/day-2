<!DOCTYPE html>
    <html lang="it">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Tabelle</title>
            <link rel="stylesheet" type="text/css" href="assets/css/style.css">
        </head>

        <body>
            <table>
                <caption> Elenco persone</caption>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>COGNOME</th>
                        <th>ETÀ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sabrina</td>
                        <td>Rossi</td>
                        <td>30</td>
                    </tr>
                    <tr>
                        <td>Luca</td>
                        <td>Bianchi</td>
                        <td>25</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3">Totale persone: 3</td>
                    </tr>
                </tfoot>
            </table>
        </body>
    </html>
